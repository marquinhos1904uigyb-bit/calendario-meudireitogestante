<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Conteúdo — Meu Direito Gestante</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f13;--card:#1a1a24;--card-hover:#22222e;--accent:#c97878;--accent2:#a85c5c;--green:#4ade80;--green-bg:rgba(74,222,128,.1);--yellow:#facc15;--yellow-bg:rgba(250,204,21,.1);--text:#e8e8ef;--muted:#8888a0;--border:#2a2a3a;--reel:#7c3aed;--carrossel:#2563eb;--imagem:#db2777;--story:#f59e0b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* HEADER */
.header{background:linear-gradient(135deg,#1a1a24 0%,#2a1a2a 100%);border-bottom:1px solid var(--border);padding:24px 20px;text-align:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header h1{font-size:1.4rem;font-weight:700;color:var(--accent);letter-spacing:-.5px}
.header p{font-size:.85rem;color:var(--muted);margin-top:4px}
.progress-bar-wrap{max-width:500px;margin:16px auto 0;background:#1f1f2e;border-radius:20px;height:10px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#e8a0a0);border-radius:20px;transition:width .5s ease;width:0%}
.progress-text{font-size:.75rem;color:var(--muted);margin-top:6px}

/* STATS */
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:16px 20px;max-width:700px;margin:0 auto}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 18px;text-align:center;min-width:90px}
.stat .num{font-size:1.5rem;font-weight:700;color:var(--accent)}
.stat .label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* NAV TABS */
.nav{display:flex;gap:6px;padding:16px 20px;overflow-x:auto;justify-content:center;flex-wrap:wrap;max-width:900px;margin:0 auto;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav button{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:10px;font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap;font-weight:500}
.nav button:hover{background:var(--card-hover);color:var(--text)}
.nav button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav button.completed-tab{border-color:var(--green);color:var(--green)}
.nav button.partial-tab{border-color:var(--yellow);color:var(--yellow)}

/* CONTENT */
.container{max-width:800px;margin:0 auto;padding:20px}
.day-panel{display:none}
.day-panel.active{display:block}

/* SECTION */
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;transition:all .2s}
.section:hover{border-color:#3a3a4a}

.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-reel{background:rgba(124,58,237,.15);color:#a78bfa}
.badge-carrossel{background:rgba(37,99,235,.15);color:#60a5fa}
.badge-imagem{background:rgba(219,39,119,.15);color:#f472b6}
.badge-story{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-acao{background:rgba(16,185,129,.15);color:#34d399}
.badge-sponsor{background:rgba(250,204,21,.2);color:#facc15;border:1px solid rgba(250,204,21,.3)}
.time{font-size:.75rem;color:var(--muted);margin-left:auto;font-weight:500}

h2{font-size:1.1rem;font-weight:700;margin-bottom:4px}
h3{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:10px}

.field{margin-bottom:12px}
.field-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.field-value{font-size:.88rem;color:var(--text);line-height:1.7}
.field-value em{color:var(--accent);font-style:normal;font-weight:500}

.hook-box{background:linear-gradient(135deg,rgba(201,120,120,.1),rgba(201,120,120,.05));border:1px solid rgba(201,120,120,.2);border-radius:12px;padding:14px 16px;margin-bottom:12px;font-size:.95rem;font-weight:600;color:#e8a0a0}
.hook-box::before{content:"🎣 ";font-size:1rem}

.cta-box{background:linear-gradient(135deg,rgba(74,222,128,.08),rgba(74,222,128,.03));border:1px solid rgba(74,222,128,.2);border-radius:12px;padding:12px 16px;margin-top:12px;font-size:.85rem;color:#86efac}
.cta-box::before{content:"CTA: ";font-weight:700}

.hashtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.hashtag{background:rgba(201,120,120,.1);color:var(--accent);padding:3px 8px;border-radius:6px;font-size:.72rem;font-weight:500}

/* CHECKLIST */
.checklist{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;cursor:pointer;-webkit-user-select:none;user-select:none}
.check-item:hover{opacity:.85}
.check-box{width:20px;height:20px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.check-item.done .check-box{background:var(--green);border-color:var(--green)}
.check-item.done .check-box::after{content:"✓";color:#000;font-size:12px;font-weight:700}
.check-item.done .check-label{text-decoration:line-through;color:var(--muted)}
.check-label{font-size:.85rem}

/* STORIES GRID */
.stories-grid{display:grid;grid-template-columns:1fr;gap:10px}
.story-card{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15);border-radius:10px;padding:12px 14px;font-size:.85rem}
.story-card strong{color:#fbbf24;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}

/* DAY HEADER */
.day-header{text-align:center;margin-bottom:24px}
.day-number{font-size:3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),#e8a0a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.day-title{font-size:1rem;color:var(--muted);margin-top:4px}
.day-phase{display:inline-block;padding:4px 12px;border-radius:8px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:8px}
.phase-plantar{background:rgba(124,58,237,.15);color:#a78bfa}
.phase-crescer{background:rgba(37,99,235,.15);color:#60a5fa}
.phase-analisar{background:rgba(16,185,129,.15);color:#34d399}

/* RULES PANEL */
.rules{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px}
.rules h3{color:var(--accent);font-size:.9rem;margin-bottom:12px}
.rules ul{list-style:none;padding:0}
.rules li{padding:6px 0;font-size:.85rem;color:var(--text);border-bottom:1px solid var(--border)}
.rules li:last-child{border:none}
.rules li::before{content:"→ ";color:var(--accent);font-weight:700}

/* ALERT BOX */
.alert{background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.25);border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:.85rem;color:#fde68a}
.alert::before{content:"⚡ ";font-size:1rem}
.alert-green{background:var(--green-bg);border-color:rgba(74,222,128,.25);color:#86efac}
.alert-green::before{content:"✅ "}

/* OVERVIEW TAB */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:16px}
.overview-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.overview-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.overview-card .oc-day{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.overview-card .oc-title{font-size:.9rem;font-weight:600;margin:6px 0}
.overview-card .oc-tags{display:flex;gap:4px;flex-wrap:wrap}
.overview-card .oc-progress{margin-top:10px;background:#1f1f2e;border-radius:10px;height:4px;overflow:hidden}
.overview-card .oc-progress-fill{height:100%;background:var(--green);border-radius:10px;transition:width .3s}

/* RESPONSIVE */
@media(max-width:600px){
  .header h1{font-size:1.1rem}
  .stats{gap:8px}
  .stat{min-width:70px;padding:10px 12px}
  .stat .num{font-size:1.2rem}
  .nav{justify-content:flex-start;flex-wrap:nowrap}
  .container{padding:12px}
  .section{padding:18px}
  .day-number{font-size:2.2rem}
}

/* PRINT */
@media print{
  .header,.nav,.stats,.check-box{display:none!important}
  .day-panel{display:block!important;break-inside:avoid;page-break-inside:avoid}
  body{background:#fff;color:#000}
  .section{border:1px solid #ddd;break-inside:avoid}
}
</style>
</head>

// ==================== RENDER ENGINE ====================

function getPhaseLabel(p) {
  const m = {plantar:'Semana 1: Plantar',crescer:'Semana 2: Crescer',analisar:'Dia 15: Analisar'};
  return m[p]||p;
}
function getPhaseClass(p) { return 'phase-'+p; }
function getBadgeClass(t) {
  const m = {reel:'badge-reel',carrossel:'badge-carrossel',imagem:'badge-imagem',story:'badge-story',acao:'badge-acao'};
  return m[t]||'badge-acao';
}
function getTypeLabel(t) {
  const m = {reel:'Reel',carrossel:'Carrossel',imagem:'Post Imagem',story:'Story',acao:'Ação'};
  return m[t]||t;
}

function getStorageKey(dayIdx, postIdx, taskIdx) {
  return `mdg_d${dayIdx}_p${postIdx}_t${taskIdx}`;
}
function getStoryKey(dayIdx, storyIdx) {
  return `mdg_d${dayIdx}_s${storyIdx}`;
}
function getAnalysisKey(dayIdx, type, idx) {
  return `mdg_d${dayIdx}_a_${type}_${idx}`;
}

function isChecked(key) {
  return localStorage.getItem(key) === '1';
}
function toggleCheck(key) {
  localStorage.setItem(key, isChecked(key) ? '0' : '1');
  updateProgress();
  renderNav();
}

function getAllKeys() {
  const keys = [];
  DAYS.forEach((day, di) => {
    day.posts.forEach((post, pi) => {
      (post.tasks||[]).forEach((_, ti) => {
        keys.push(getStorageKey(di, pi, ti));
      });
    });
    (day.stories||[]).forEach((_, si) => {
      keys.push(getStoryKey(di, si));
    });
    if (day.analysis) {
      day.analysis.metrics.forEach((_, i) => keys.push(getAnalysisKey(di,'m',i)));
      day.analysis.decisions.forEach((_, i) => keys.push(getAnalysisKey(di,'d',i)));
    }
  });
  return keys;
}

function getDayKeys(di) {
  const keys = [];
  const day = DAYS[di];
  day.posts.forEach((post, pi) => {
    (post.tasks||[]).forEach((_, ti) => {
      keys.push(getStorageKey(di, pi, ti));
    });
  });
  (day.stories||[]).forEach((_, si) => {
    keys.push(getStoryKey(di, si));
  });
  if (day.analysis) {
    day.analysis.metrics.forEach((_, i) => keys.push(getAnalysisKey(di,'m',i)));
    day.analysis.decisions.forEach((_, i) => keys.push(getAnalysisKey(di,'d',i)));
  }
  return keys;
}

function getDayProgress(di) {
  const keys = getDayKeys(di);
  if (!keys.length) return {done:0,total:0,pct:0};
  const done = keys.filter(k => isChecked(k)).length;
  return {done, total: keys.length, pct: Math.round(done/keys.length*100)};
}

function updateProgress() {
  const keys = getAllKeys();
  const done = keys.filter(k => isChecked(k)).length;
  const pct = keys.length ? Math.round(done/keys.length*100) : 0;
  document.getElementById('mainProgress').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${done} de ${keys.length} tarefas concluídas (${pct}%)`;
  document.getElementById('statDone').textContent = done;
}

let activeDay = -1; // -1 = overview

function renderNav() {
  const nav = document.getElementById('navTabs');
  let html = `<button class="${activeDay===-1?'active':''}" onclick="showDay(-1)">Visão Geral</button>`;
  DAYS.forEach((day, i) => {
    const prog = getDayProgress(i);
    let cls = activeDay===i ? 'active' : '';
    if (!cls && prog.total > 0) {
      if (prog.pct === 100) cls = 'completed-tab';
      else if (prog.done > 0) cls = 'partial-tab';
    }
    html += `<button class="${cls}" onclick="showDay(${i})">Dia ${day.day}</button>`;
  });
  nav.innerHTML = html;
}

function renderCheckItem(key, label) {
  const done = isChecked(key);
  return `<div class="check-item ${done?'done':''}" onclick="toggleCheck('${key}')">
    <div class="check-box"></div>
    <div class="check-label">${label}</div>
  </div>`;
}

function renderPost(post, dayIdx, postIdx) {
  let html = `<div class="section">`;
  html += `<div class="section-header">`;
  html += `<span class="badge ${getBadgeClass(post.type)}">${getTypeLabel(post.type)}</span>`;
  if (post.sponsor) html += `<span class="badge badge-sponsor">💰 Patrocinar</span>`;
  html += `<span class="time">${post.time}</span>`;
  html += `</div>`;
  html += `<h3>${post.title}</h3>`;

  if (post.hook) {
    html += `<div class="hook-box">"${post.hook}"</div>`;
  }

  html += `<div class="field"><div class="field-label">Conteúdo / Roteiro</div><div class="field-value">${post.content.replace(/\n/g,'<br>')}</div></div>`;

  if (post.visual) {
    html += `<div class="field"><div class="field-label">Visual / Formato</div><div class="field-value">${post.visual}</div></div>`;
  }

  if (post.cta) {
    html += `<div class="cta-box">${post.cta}</div>`;
  }

  // Hashtags
  const dayNum = DAYS[dayIdx].day;
  const hashGroup = dayNum % 3;
  const hashtags = [
    ['#gravida','#gestante','#gravidez','#mamaedeprimeiraviagem','#barrigadegravida','#dicasdegravida','#enxovaldebebe'],
    ['#gravida','#maternidade','#bebe','#gravida2026','#vidademae','#quartodobebe','#maternidadereal'],
    ['#gestante','#gravidez','#maternidade','#recemnascido','#mamaedeprimeiraviagem','#chadebebe','#dicasdegravida']
  ];
  html += `<div class="hashtags">${hashtags[hashGroup].map(h=>`<span class="hashtag">${h}</span>`).join('')}</div>`;

  // Tasks checklist
  if (post.tasks && post.tasks.length) {
    html += `<div class="checklist">`;
    post.tasks.forEach((task, ti) => {
      html += renderCheckItem(getStorageKey(dayIdx, postIdx, ti), task);
    });
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function renderDay(dayIdx) {
  const day = DAYS[dayIdx];
  const prog = getDayProgress(dayIdx);

  let html = `<div class="day-header">`;
  html += `<div class="day-number">DIA ${day.day}</div>`;
  html += `<div class="day-title">${day.title}</div>`;
  html += `<div class="day-phase ${getPhaseClass(day.phase)}">${getPhaseLabel(day.phase)}</div>`;
  if (prog.total) html += `<div class="progress-text" style="margin-top:10px">${prog.done}/${prog.total} tarefas (${prog.pct}%)</div>`;
  html += `</div>`;

  if (day.alert) {
    html += `<div class="alert">${day.alert}</div>`;
  }

  // Posts
  day.posts.forEach((post, pi) => {
    html += renderPost(post, dayIdx, pi);
  });

  // Analysis (day 15)
  if (day.analysis) {
    html += `<div class="section"><h3>📊 Métricas para Analisar</h3><div class="checklist">`;
    day.analysis.metrics.forEach((m, i) => {
      html += renderCheckItem(getAnalysisKey(dayIdx,'m',i), m);
    });
    html += `</div></div>`;

    html += `<div class="section"><h3>🎯 Decisões para Tomar</h3><div class="checklist">`;
    day.analysis.decisions.forEach((d, i) => {
      html += renderCheckItem(getAnalysisKey(dayIdx,'d',i), d);
    });
    html += `</div></div>`;
  }

  // Stories
  if (day.stories && day.stories.length) {
    html += `<div class="section">`;
    html += `<div class="section-header"><span class="badge badge-story">Stories do dia</span></div>`;
    html += `<div class="stories-grid">`;
    day.stories.forEach((s, si) => {
      html += `<div class="story-card">`;
      html += `<div class="check-item ${isChecked(getStoryKey(dayIdx,si))?'done':''}" onclick="toggleCheck('${getStoryKey(dayIdx,si)}')">`;
      html += `<div class="check-box"></div>`;
      html += `<div class="check-label">${s}</div>`;
      html += `</div></div>`;
    });
    html += `</div></div>`;
  }

  return html;
}

function renderOverview() {
  let html = `<div class="day-header">
    <div class="day-number" style="font-size:2rem">VISÃO GERAL</div>
    <div class="day-title">Clique em um dia para ver os detalhes</div>
  </div>`;

  // Rules
  html += `<div class="rules"><h3>Regras de Ouro</h3><ul>
    <li><strong>Frequência:</strong> 2 posts/dia (1 Reel + 1 imagem/carrossel) + 3-5 Stories</li>
    <li><strong>Horários:</strong> 11h30 e 20h (picos de grávida no celular)</li>
    <li><strong>Reels:</strong> 7-15 segundos (curto performa melhor pra contas novas)</li>
    <li><strong>Carrossel:</strong> 5-7 slides máximo</li>
    <li><strong>Imagem:</strong> 1080x1350 (4:5) — ocupa mais tela no feed</li>
    <li><strong>Hashtags:</strong> 5-8 por post. 3 de alcance + 2 de nicho + 2 de engajamento</li>
    <li><strong>NÃO postar</strong> entre 00h-07h e 14h-17h</li>
    <li><strong>Primeiro poste os 3 posts do Dia 0</strong> de uma vez antes de seguir o calendário</li>
  </ul></div>`;

  html += `<div class="rules"><h3>Distribuição nos Grupos de Grávidas</h3><ul>
    <li><strong>Dia 0-2:</strong> Entrar em 15-20 grupos. Só curtir e comentar. ZERO posts.</li>
    <li><strong>Dia 3:</strong> Compartilhar curiosidade do estômago do bebê (sem citar página)</li>
    <li><strong>Dia 4:</strong> Compartilhar carrossel "tamanho do bebê semana a semana"</li>
    <li><strong>Dia 5:</strong> Compartilhar Reels "pesquisas no Google"</li>
    <li><strong>Dia 6-7:</strong> Curiosidade original + "tenho mais assim na @meudireitogestante"</li>
    <li><strong>Dia 8-14:</strong> 1 post/dia em cada grupo, alternando conteúdo</li>
  </ul></div>`;

  html += `<div class="rules"><h3>Investimento em Ads (opcional)</h3><ul>
    <li><strong>Dia 1-3:</strong> R$5/dia — impulsionar melhor post (objetivo: engajamento)</li>
    <li><strong>Dia 4-7:</strong> R$10/dia — impulsionar post que mais bombou organicamente</li>
    <li><strong>Dia 8-14:</strong> R$10/dia — só Reels com retenção acima de 50%</li>
    <li><strong>Público:</strong> Mulheres 18-38, interesses: Gravidez, Bebês, Maternidade</li>
    <li><strong>Total 15 dias:</strong> ~R$120-150</li>
  </ul></div>`;

  // Day cards
  html += `<div class="overview-grid">`;
  DAYS.forEach((day, i) => {
    const prog = getDayProgress(i);
    const types = [...new Set(day.posts.map(p => p.type))];
    html += `<div class="overview-card" onclick="showDay(${i})">
      <div class="oc-day">Dia ${day.day}</div>
      <div class="oc-title">${day.title}</div>
      <div class="oc-tags">${types.map(t=>`<span class="badge ${getBadgeClass(t)}" style="font-size:.6rem">${getTypeLabel(t)}</span>`).join('')}${day.posts.some(p=>p.sponsor)?'<span class="badge badge-sponsor" style="font-size:.6rem">💰</span>':''}</div>
      <div class="oc-progress"><div class="oc-progress-fill" style="width:${prog.pct}%"></div></div>
    </div>`;
  });
  html += `</div>`;

  return html;
}

function showDay(idx) {
  activeDay = idx;
  const container = document.getElementById('content');
  container.innerHTML = idx === -1 ? renderOverview() : renderDay(idx);
  renderNav();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Init
showDay(-1);
updateProgress();
</script>
</body>
</html>
